services:
    coinage-db:
        restart: unless-stopped
        image: mysql
        env_file:
            - ./.env
        ports:
            - 3306:3306
        healthcheck:
            test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "--password=$MYSQL_ROOT_PASSWORD"]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s
    coinage-api:
        build:
            context: .
            dockerfile: docker/api.Dockerfile
        image: coinage-api
        environment:
            MYSQL_HOST: coinage-db
        env_file:
            - ./.env
        ports:
            - 3333:3333
        depends_on:
            coinage-db:
                condition: service_healthy
    coinage-webapp:
        build:
            context: .
            dockerfile: docker/webapp.Dockerfile
        image: coinage-webapp
        ports:
            - 4200:4200
        depends_on:
            - coinage-api
